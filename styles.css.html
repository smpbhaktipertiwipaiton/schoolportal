<style> 
/* ==================== CUSTOM STYLES ==================== */

/* Base */
* {
  font-family: 'Poppins', sans-serif;
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: #f8fafc;
}

::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 3px;
}

/* Firefox scrollbar */
* {
  scrollbar-width: thin;
  scrollbar-color: #cbd5e1 #f8fafc;
}

/* Animations */
.fade-in {
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { 
    opacity: 0; 
    transform: translateY(15px); 
  }
  to { 
    opacity: 1; 
    transform: translateY(0); 
  }
}

.hidden {
  display: none !important;
}

/* ==================== SIDEBAR STYLES ==================== */
.sidebar {
  transition: width 0.3s ease;
}

.sidebar.collapsed {
  width: 80px;
}

.sidebar.collapsed .nav-text {
  display: none;
}

.sidebar.collapsed nav {
  padding-left: 0;
  padding-right: 0;
}

.sidebar.collapsed .nav-item {
  justify-content: center;
  padding: 14px 0 !important;
  margin: 6px auto !important;
  width: 48px;
  min-width: 48px;
}

.sidebar.collapsed .nav-item i {
  margin-right: 0 !important;
  margin-left: 0 !important;
  font-size: 18px;
  width: auto;
}

/* Toggle button floats outside when collapsed */
.sidebar.collapsed #sidebar-toggle-btn {
  position: fixed;
  left: 68px;
  top: 24px;
  background: white;
  color: #4f46e5;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  z-index: 100;
  display: flex !important;
  align-items: center;
  justify-content: center;
}

.sidebar.collapsed #sidebar-toggle-btn i {
  font-size: 10px;
}

/* Nav Items */
.nav-item {
  transition: all 0.3s ease;
  border-radius: 16px;
  margin: 6px 10px;
}

.nav-item:hover {
  background: rgba(255,255,255,0.15);
  color: white;
  transform: translateX(4px);
}

.nav-item.active {
  background: white;
  color: #4f46e5;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

/* ==================== CARD STYLES ==================== */
.stat-card {
  transition: all 0.3s ease;
  overflow: hidden;
}

.stat-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
}

.stat-card-border-coral {
  border-left: 5px solid #fb7185;
}

.stat-card-border-purple {
  border-left: 5px solid #8b5cf6;
}

.stat-card-border-yellow {
  border-left: 5px solid #fbbf24;
}

.stat-card-border-green {
  border-left: 5px solid #34d399;
}

.content-card {
  transition: all 0.3s ease;
}

.content-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

/* ==================== ICON CONTAINERS ==================== */
.icon-container {
  transition: all 0.3s ease;
}

.icon-coral {
  background: #fef2f2;
  color: #fb7185;
}

.icon-purple {
  background: #f5f3ff;
  color: #8b5cf6;
}

.icon-yellow {
  background: #fffbeb;
  color: #fbbf24;
}

.icon-green {
  background: #ecfdf5;
  color: #34d399;
}

.icon-blue {
  background: #eff6ff;
  color: #3b82f6;
}

/* ==================== BUTTONS ==================== */
.btn-primary {
  transition: all 0.3s ease;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4);
}

/* Tab Buttons */
.tab-btn {
  transition: all 0.3s ease;
  white-space: nowrap;
}

.tab-btn:hover {
  background: #e2e8f0;
}

.tab-btn.active {
  background: #4f46e5;
  color: white;
  box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
}

/* ==================== TABLES ==================== */
.table-row {
  transition: background-color 0.2s ease;
}

.table-row:hover {
  background-color: #f8fafc;
}

/* ==================== MODALS ==================== */
.modal-enter {
  animation: modalEnter 0.3s ease-out;
}

@keyframes modalEnter {
  from { 
    opacity: 0; 
    transform: scale(0.95); 
  }
  to { 
    opacity: 1; 
    transform: scale(1); 
  }
}

/* ==================== MOBILE SIDEBAR ==================== */
@media (max-width: 1023px) {
  .sidebar {
    transform: translateX(-100%);
  }
  
  .sidebar.open {
    transform: translateX(0);
  }
  
  .main-content {
    margin-left: 0 !important;
  }
}

/* ==================== RESPONSIVE ADJUSTMENTS ==================== */
@media (max-width: 640px) {
  .stat-card {
    padding: 1rem;
  }
  
  .icon-container {
    width: 44px;
    height: 44px;
  }
  
  .icon-container i {
    font-size: 1rem;
  }
}

/* Large Desktop (xl) - Wider layouts */
@media (min-width: 1280px) {
  .xl\:max-w-7xl {
    max-width: 80rem;
  }
  
  .xl\:grid-cols-3 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  
  .xl\:grid-cols-4 {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
}

/* Extra Large Desktop (2xl) */
@media (min-width: 1536px) {
  .student-content-page {
    max-width: 100%;
  }
}

/* Sidebar visibility fix for student page */
#page-student {
  display: flex;
  flex-direction: column;
}

@media (min-width: 768px) {
  #page-student {
    flex-direction: row;
  }
  
  #page-student > aside {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 18rem;
    display: flex !important;
    flex-direction: column;
  }
  
  #page-student > main {
    margin-left: 18rem;
    flex: 1;
    min-height: 100vh;
  }
}

/* ==================== UTILITY CLASSES ==================== */
.line-clamp-2 {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.line-clamp-3 {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Active states for student nav */
.student-nav-btn.active {
  color: #6366f1;
}

.student-desktop-nav.active {
  background: #ecfdf5;
  color: #059669;
}

/* Quiz animations */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.animate-fade-in {
  animation: fadeIn 0.3s ease-out;
}

/* Quiz option hover effect */
#quiz-question-container button:hover {
  transform: translateY(-2px);
}

#quiz-question-container button {
  transition: all 0.2s ease;
}

/* Ensure student sidebar shows on desktop (md breakpoint and up) */
@media (min-width: 768px) {
  #page-student aside,
  #page-teacher aside {
    display: flex !important;
  }
  
  #page-student main,
  #page-teacher main {
    margin-left: 18rem !important;
    width: calc(100% - 18rem) !important;
    padding-top: 2rem !important;
  }
  
  /* Hide mobile header on desktop */
  #page-student > header.lg\:hidden,
  #page-teacher > header.lg\:hidden {
    display: none !important;
  }
}

/* Student sidebar specific styles */
#page-student aside {
  background: white;
  border-right: 1px solid #e5e7eb;
}

#page-student aside .nav-item:hover,
#page-student aside button:hover {
  background-color: #f9fafb;
}

/* Force sidebar visibility on desktop */
@media (min-width: 768px) {
  #page-student > aside.hidden.md\:flex {
    display: flex !important;
  }
}

@media (min-width: 1024px) {
  #page-teacher > aside.hidden.lg\:flex {
    display: flex !important;
  }
}

/* Teacher page specific styles */
#page-teacher {
  display: flex;
  flex-direction: column;
}

@media (min-width: 1024px) {
  #page-teacher {
    flex-direction: row;
  }
  
  #page-teacher > aside {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 18rem;
    display: flex !important;
    flex-direction: column;
  }
  
  #page-teacher > main {
    margin-left: 18rem;
    flex: 1;
    min-height: 100vh;
  }
}

/* Video mirror for camera */
#attendance-video {
  transform: scaleX(-1);
}

/* Scale on active/tap */
.active\:scale-95:active {
  transform: scale(0.97);
}

/* Loading spinner animation */
@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.fa-spin {
  animation: spin 1s linear infinite;
}

/* Toast animation */
#toast {
  transition: all 0.3s ease;
}

#toast.show {
  opacity: 1;
  transform: translateY(0);
}

/* Chart container */
canvas {
  max-width: 100%;
  height: auto;
}

/* Smooth scroll */
html {
  scroll-behavior: smooth;
}

/* Focus visible for accessibility */
button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 2px solid #4f46e5;
  outline-offset: 2px;
}

/* Safe area for mobile */
.pb-safe {
  padding-bottom: env(safe-area-inset-bottom, 0);
}

/* Print styles */
@media print {
  .sidebar,
  header,
  .nav-item,
  button {
    display: none !important;
  }
  
  .main-content {
    margin-left: 0 !important;
  }
}</style>
